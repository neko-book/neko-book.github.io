<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 章节未找到</title>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc/400.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc/700.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4eb;
            --card: #fffdf8;
            --text-main: #3a3530;
            --text-sub: #7a7268;
            --accent: #8b5a2b;
            --accent-hover: #6d4520;
            --line: #d4c9b5;
            --shadow: 0 12px 40px rgba(58, 53, 48, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Noto Serif SC", "Songti SC", "SimSun", Georgia, serif;
            background: var(--bg);
            background-image: radial-gradient(#e8e0d0 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .container {
            background: var(--card);
            padding: 3.5rem 2.5rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 460px;
            width: 100%;
            position: relative;
            border: 1px solid #e6dfcf;
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 书签飘带动效 */
        .bookmark {
            position: absolute; top: 0; right: 32px;
            width: 26px; height: 65px;
            background: var(--accent);
            border-radius: 0 0 5px 5px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.12);
            animation: sway 5s ease-in-out infinite;
            z-index: 2;
        }
        .bookmark::after {
            content: ''; position: absolute; bottom: -9px; left: 0;
            border-left: 13px solid transparent; border-right: 13px solid transparent;
            border-top: 9px solid var(--accent);
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            50% { transform: rotate(3deg) translateY(-4px); }
        }

        .illustration { margin-bottom: 1.8rem; color: var(--accent); }
        h1 {
            font-size: 4rem; font-weight: 700; color: var(--accent);
            letter-spacing: 4px; margin-bottom: 0.5rem; line-height: 1;
        }
        .divider {
            width: 80px; height: 2px; margin: 1rem auto 1.5rem;
            background: linear-gradient(90deg, transparent, var(--line), transparent);
        }
        .subtitle {
            font-size: 1.15rem; color: var(--text-sub); line-height: 1.7;
            margin-bottom: 2.2rem;
        }

        .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 28px; font-size: 1rem; font-family: inherit;
            text-decoration: none; border-radius: 6px; transition: all 0.25s ease;
            border: 1.5px solid var(--accent); background: transparent; color: var(--accent);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(139, 90, 43, 0.15); }
        .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        .quote {
            margin-top: 2.5rem; font-style: italic; color: #9a928a; font-size: 0.95rem;
            position: relative; padding-top: 1rem; border-top: 1px dashed #d4c9b5;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
            .container { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bookmark"></div>
        
        <svg class="illustration" width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 左侧书页 -->
            <path d="M15 25 Q45 25 45 65 Q45 25 15 25 Z" fill="#e8e0d0" stroke="#8b5a2b" stroke-width="2"/>
            <!-- 右侧书页 -->
            <path d="M75 25 Q45 25 45 65 Q45 25 75 25 Z" fill="#f0ebe3" stroke="#8b5a2b" stroke-width="2"/>
            <!-- 缺失/撕裂的页面提示 -->
            <path d="M45 65 L45 25" stroke="#8b5a2b" stroke-width="2" stroke-dasharray="3 3" opacity="0.4"/>
            <path d="M55 35 L70 30 L70 55 L55 60 Z" fill="none" stroke="#8b5a2b" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
            <text x="62.5" y="48" font-family="serif" font-size="14" fill="#8b5a2b" text-anchor="middle" transform="rotate(12 62.5 48)">?</text>
            <!-- 装饰线条 -->
            <path d="M25 35 H35 M25 43 H32 M25 51 H35" stroke="#8b5a2b" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        </svg>

        <h1>404</h1>
        <div class="divider"></div>
        <p class="subtitle">抱歉，这一页似乎被风吹走了。<br>或许是作者还在斟酌下一段的剧情，<br>请移步其他章节继续阅读。</p>
        
        <div class="actions">
            <a href="/" class="btn primary">返回首页</a>
        </div>
        
        <p class="quote">“所有未读完的故事，终将在书架上重逢。”</p>
    </div>
</body>
</html>
